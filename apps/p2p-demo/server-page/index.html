<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>p2p-demo · server page</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 64rem; }
      h1 { margin-top: 0; }
      h2 { font-size: 1rem; margin: 1.5rem 0 0.5rem; color: #4b5563; text-transform: uppercase; letter-spacing: 0.05em; }
      code, pre { background: #f4f4f5; padding: 0.1rem 0.3rem; border-radius: 0.2rem; }
      pre { padding: 0.5rem; overflow-x: auto; }
      #status-header { background: #eff6ff; padding: 0.6rem 0.8rem; border-radius: 0.3rem; border: 1px solid #bfdbfe; font-family: monospace; font-size: 0.9rem; }
      #status-header span { margin-right: 0.4rem; }
      #status-state { color: #1d4ed8; font-weight: 600; }
      .role-badge { display: inline-block; padding: 0.05rem 0.45rem; border-radius: 0.2rem; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; }
      .role-badge-server { background: #d1fae5; color: #047857; }
      .role-badge-client { background: #fef3c7; color: #92400e; }
      ul { list-style: none; padding: 0; margin: 0; }
      li { padding: 0.3rem 0.6rem; border-bottom: 1px solid #f4f4f5; font-family: monospace; font-size: 0.9rem; }
      li:last-child { border-bottom: none; }
      .peer-id { color: #6b7280; }
      .role-server { color: #047857; font-weight: 600; }
      .role-client { color: #6b7280; }
      #status { font-family: monospace; white-space: pre-wrap; background: #f4f4f5; padding: 0.5rem; min-height: 4rem; max-height: 12rem; overflow-y: auto; }
    </style>
  </head>
  <body>
    <h1 id="page-title">Server: <code id="page-synth">······</code></h1>

    <div id="status-header">
      <span>group: <code id="group-id">…</code></span>
      <span>·</span>
      <span>self: <code id="peer-id" title="">…</code> <span class="role-badge role-badge-server">SERVER</span></span>
      <span>·</span>
      <span id="status-state">starting up…</span>
    </div>

    <h2>My services (announced)</h2>
    <ul id="my-services"><li>(none yet)</li></ul>

    <h2>Peers in group (live)</h2>
    <ul id="peers"><li>(no peers yet)</li></ul>

    <h2>Activity log</h2>
    <div id="status">starting up…</div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
