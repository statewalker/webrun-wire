<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>p2p-demo · client page</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 72rem; }
      h1 { margin-top: 0; }
      h2 { font-size: 1rem; margin: 1.5rem 0 0.5rem; color: #4b5563; text-transform: uppercase; letter-spacing: 0.05em; }
      code, pre { background: #f4f4f5; padding: 0.1rem 0.3rem; border-radius: 0.2rem; }
      #status-header { background: #eff6ff; padding: 0.6rem 0.8rem; border-radius: 0.3rem; border: 1px solid #bfdbfe; font-family: monospace; font-size: 0.9rem; }
      #status-header span { margin-right: 0.4rem; }
      #status-state { color: #1d4ed8; font-weight: 600; }
      ul { list-style: none; padding: 0; margin: 0; }
      .svc-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.35rem 0.6rem; border-bottom: 1px solid #f4f4f5; font-family: monospace; font-size: 0.9rem; }
      .svc-row:last-child { border-bottom: none; }
      .svc-title { font-weight: 600; min-width: 8rem; }
      .svc-peer { color: #6b7280; flex: 1; }
      .svc-state-available { color: #1d4ed8; }
      .svc-state-mounted { color: #047857; font-weight: 600; }
      .svc-state-disconnected { color: #b91c1c; font-weight: 600; }
      button { padding: 0.2rem 0.7rem; cursor: pointer; }
      .mount-card { margin: 0.6rem 0; border: 1px solid #e5e5e5; border-radius: 0.3rem; overflow: hidden; }
      .mount-header { background: #f9fafb; padding: 0.4rem 0.7rem; font-family: monospace; font-size: 0.85rem; display: flex; align-items: center; gap: 0.6rem; }
      .mount-header strong { flex: 1; }
      .badge-connected { color: #047857; font-weight: 600; }
      .badge-disconnected { color: #b91c1c; font-weight: 600; }
      .mount-iframe { display: block; width: 100%; height: 18rem; border: none; background: white; }
      .mount-iframe-dimmed { opacity: 0.45; filter: grayscale(0.6); }
      #status { font-family: monospace; white-space: pre-wrap; background: #f4f4f5; padding: 0.5rem; min-height: 4rem; max-height: 12rem; overflow-y: auto; }
    </style>
  </head>
  <body>
    <h1>p2p-demo · client page</h1>

    <div id="status-header">
      <span>group: <code id="group-id">…</code></span>
      <span>·</span>
      <span>self: <code id="peer-id">…</code></span>
      <span>·</span>
      <span id="status-state">starting up…</span>
    </div>

    <h2>Services in group (live)</h2>
    <ul id="services"><li class="svc-row">(no services yet)</li></ul>

    <h2>Mounted</h2>
    <div id="mounts"></div>

    <h2>Activity log</h2>
    <div id="status">starting up…</div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
